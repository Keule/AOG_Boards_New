name: CI

on:
  push:
    branches: [ main, development, develop ]
  pull_request:
    branches: [ main, development ]

jobs:
  # ============================================================
  # Job 1: ADR Architecture Compliance Checks
  # ============================================================
  adr-checks:
    name: ADR Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run ADR checks
        run: python tools/adr_checks/check_all.py --repo-root .

  # ============================================================
  # Job 2: Native Host Tests
  # ============================================================
  native-tests:
    name: Native Host Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          pip install --upgrade pip
          pip install platformio

      - name: Run native tests
        run: pio test -e native

  # ============================================================
  # Job 3: Build Matrix (all ESP32 profiles)
  # ============================================================
  build:
    name: Build ESP32
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - nav_esp32_t_eth_lite
          - steer_esp32s3_t_eth_lite
          - full_test_esp32s3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          pip install --upgrade pip
          pip install platformio

      - name: Build ${{ matrix.environment }}
        run: pio run -e ${{ matrix.environment }}

      - name: Check for Arduino usage
        run: |
          grep -R -n -E 'Arduino\.h|WiFi\.h|WebServer\.h|SPI\.h|Wire\.h|BluetoothSerial\.h' . \
            --exclude-dir=.git \
            --exclude-dir=.pio \
            --exclude=.github/workflows/ci.yml && exit 1 || exit 0

      - name: Check for invalid empty SRCS in CMakeLists
        run: |
          grep -R -n 'SRCS\s*""' components/ --include="CMakeLists.txt" && echo "ERROR: Found SRCS \"\"" && exit 1 || exit 0

      - name: Verify all required component directories exist
        run: |
          for comp in board_profiles feature_flags terminal cli transport_eth app_core; do
            if [ ! -d "components/$comp" ]; then
              echo "ERROR: Missing component $comp"
              exit 1
            fi
            if [ ! -f "components/$comp/CMakeLists.txt" ]; then
              echo "ERROR: Missing CMakeLists.txt in $comp"
              exit 1
            fi
          done
          echo "All components verified"

      - name: Verify critical project files exist
        run: |
          for f in CMakeLists.txt sdkconfig.defaults partitions.csv platformio.ini; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing $f"
              exit 1
            fi
          done
          echo "All critical files verified"
