[platformio]
default_envs = steer_esp32s3_t_eth_lite
src_dir = main

; ============================================================
; Shared ESP-IDF base environment
; ============================================================
[env]
platform = espressif32
framework = espidf
monitor_speed = 115200
build_flags =
    -D AOG_ESP_MULTIBOARD=1

; ============================================================
; ESP32 target environments
; ============================================================
[env:nav_esp32_t_eth_lite]
extends = env
board = esp32dev
build_flags =
    ${env.build_flags}
    -D DEVICE_ROLE_NAVIGATION=1
    -D CONFIG_BOARD_ESP32=1
    -D CONFIG_ETH_MAC_RMII=1

[env:steer_esp32s3_t_eth_lite]
extends = env
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -D DEVICE_ROLE_STEERING=1
    -D CONFIG_BOARD_ESP32S3=1
    -D CONFIG_ETH_W5500=1

[env:full_test_esp32s3]
extends = env
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -D DEVICE_ROLE_FULL_TEST=1
    -D CONFIG_BOARD_ESP32S3=1
    -D CONFIG_ETH_W5500=1

; ============================================================
; Native host test environment (no ESP-IDF dependency)
;
; Runs host-side unit tests with Unity framework.
; On Linux/macOS the system gcc is used (pre-installed).
; On Windows you need MinGW-w64 gcc in PATH:
;   winget install mingw
;   Then open MSYS2 MinGW terminal or add to PATH.
;
; Usage:
;   pio test -e native                  # all tests
;   pio test -e native -f "host/*"      # host tests only
;   pio test -e native -f "host/test_byte_ring_buffer"
; ============================================================
[env:native]
platform = native
framework =
build_src_filter =
    +<*>
test_build_src = false
test_framework = unity
lib_deps =
    throwtheswitch/Unity @ ^2.6.1
lib_extra_dirs = components
build_flags =
    -D AOG_ESP_MULTIBOARD=1
    -D UNIT_TEST
