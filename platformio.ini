[platformio]
default_envs = steer_esp32s3_t_eth_lite

; ============================================================
; Shared ESP-IDF base environment
; NOTE: lib_extra_dirs = lib is ONLY for native tests.
;       ESP-IDF builds do not need it (mocks break ESP-IDF build).
; ============================================================
[env]
platform = espressif32
framework = espidf
monitor_speed = 115200
build_flags =
    -D AOG_ESP_MULTIBOARD=1
; test_mocks are native-only stubs; break ESP-IDF build with -fuse-cxa-atexit
lib_ignore = test_mocks

; ============================================================
; ESP32 target environments
; ============================================================
[env:nav_esp32_t_eth_lite]
extends = env
board = esp32dev
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions/nav_esp32_ota_16mb.csv
build_flags =
    ${env.build_flags}
    -D DEVICE_ROLE_NAVIGATION=1
    -D CONFIG_BOARD_ESP32=1
    -D CONFIG_ETH_MAC_RMII=1
;    -D AOG_SYNTHETIC_MODE=1
;    ^^ Uncomment to enable SYNTHETIC PGN214 test mode (NAV-AGIO-REALTEST-001)
;    Sends fixed Berlin test position at 10 Hz instead of live GNSS at 100 Hz
extra_scripts = pre:extra_scripts/nav_gate.py
; ---- GNSS UART Baudrate override for field testing ----
; Uncomment the next line to test at 460800 baud (debug unstable UART):
; build_flags = ${nav_esp32_t_eth_lite.build_flags} -DGNSS_UART_BAUD_OVERRIDE=460800

[env:steer_esp32s3_t_eth_lite]
extends = env
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -D DEVICE_ROLE_STEERING=1
    -D CONFIG_BOARD_ESP32S3=1
    -D CONFIG_ETH_W5500=1
extra_scripts = pre:extra_scripts/nav_gate.py

[env:full_test_esp32s3]
extends = env
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -D DEVICE_ROLE_FULL_TEST=1
    -D CONFIG_BOARD_ESP32S3=1
    -D CONFIG_ETH_W5500=1
extra_scripts = pre:extra_scripts/nav_gate.py

; ============================================================
; Native host test environment (no ESP-IDF dependency)
;
; Lessons learned from NAV-TEST-INFRA-001:
; - lib_ldf_mode = chain+ enables dependency resolution for components
; - test_build_src = false prevents src/ compilation on native
; - -lm needed for math functions in tests
; - lib_ignore strips hardware/ESP-IDF components
; ============================================================
[env:native]
platform = native
framework =
build_flags =
    -D AOG_ESP_MULTIBOARD=1
    -D UNIT_TEST
    -D UNITY_INCLUDE_DOUBLE
    -lm
test_framework = unity
test_build_src = false
lib_ldf_mode = chain+
lib_extra_dirs =
    lib
    components
lib_ignore =
    hal_backend
    hal_eth
    hal_gpio
    hal_nvs
    hal_ota
    hal_reset
    hal_spi
    hal_time
    hal_uart
    imu_bno085
    was_sensor
    ads1118
    actuator_drv8263h
    steering_control
    steering_output
    steering_safety
    steering_diagnostics
    aog_steering_app
    safety_failsafe
    transport_eth
    transport_udp
    app_core
    cli
    terminal
    feature_flags
    runtime
    runtime_fast
    runtime_health
    runtime_queue
    runtime_stats
    runtime_watchdog
    hw_runtime_diag
    remote_log
    gnss_um980_snapshot
    ; ntrip_client — removed from ignore, real component used
extra_scripts = pre:extra_scripts/native_test.py
