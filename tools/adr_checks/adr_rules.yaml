# ADR Architecture Compliance Rules
#
# Each rule defines:
#   - id: Unique rule identifier
#   - description: What the rule enforces
#   - include: Glob patterns for files to check
#   - forbidden_patterns: List of patterns that must NOT appear in matching files
#
# The checker (check_all.py) scans all files matching the include patterns
# and reports violations with exit code != 0.

rules:
  - id: ADR-NO-PHYSICAL-IO-IN-TASK-FAST
    description: "task_fast / runtime_fast darf keine physische UART/UDP/TCP/SPI-I/O ausfuehren"
    include:
      - "components/runtime_fast/**"
    forbidden_patterns:
      - "uart_write_bytes"
      - "uart_read_bytes"
      - "sendto("
      - "recvfrom("
      - "transport_udp_send"
      - "transport_uart_write"
      - "transport_tcp_send"
      - "spi_device_transmit"

  - id: ADR-TRANSPORT-NO-PROTOCOL-LOGIC
    description: "Transport-Komponenten duerfen keine AOG/NMEA/RTCM-Fachlogik enthalten"
    include:
      - "components/transport_uart/**"
      - "components/transport_udp/**"
      - "components/transport_tcp/**"
    forbidden_patterns:
      - "nmea_parser"
      - "protocol_nmea"
      - "protocol_aog"
      - "protocol_rtcm"
      - "PGN_"
      - "AOG_"

  - id: ADR-AOG-APP-NO-PHYSICAL-UDP
    description: "AOG-Apps duerfen nicht direkt physisch UDP senden"
    include:
      - "components/aog_navigation_app/**"
      - "components/aog_steering_app/**"
    forbidden_patterns:
      - "sendto("
      - "transport_udp_send"
      - "transport_udp_tx_write"

  - id: ADR-GNSS-NO-DIRECT-UART
    description: "gnss_um980 darf nicht direkt UART/HAL lesen"
    include:
      - "components/gnss_um980/**"
    forbidden_patterns:
      - "uart_read_bytes"
      - "hal_uart_read"
      - "transport_uart_read"
