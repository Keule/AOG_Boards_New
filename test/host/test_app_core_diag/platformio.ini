; PlatformIO Native Test for app_core_nav_diag_step (Pflicht 3)
; Tests the pure diagnostic step function.
; Does NOT compile app_core.c (ESP32 dependency).
; Instead compiles a thin wrapper that calls app_core_nav_diag_step.

[env:native_test_app_core_diag]
platform = native
build_flags =
    -DUNIT_TEST
    -DNATIVE_TEST
    -I${workspace.component_dir}/nav_diagnostics
    -I${workspace.component_dir}/runtime_components
    -I${workspace.component_dir}/runtime_types
    -I${workspace.component_dir}/runtime_buffers
    -I${workspace.component_dir}/transport_uart
    -I${workspace.component_dir}/transport_tcp
    -I${workspace.component_dir}/gnss_um980
    -I${workspace.component_dir}/gnss_dual_heading
    -I${workspace.component_dir}/ntrip_client
    -I${workspace.component_dir}/rtcm_router
    -I${workspace.component_dir}/aog_navigation_app
    -I${workspace.component_dir}/protocol_rtcm
    -I${workspace.component_dir}/protocol_nmea
    -I${workspace.component_dir}/board_profiles
    -I${workspace.component_dir}/hal_backend
    -I${workspace.component_dir}/hal_uart
    -I${workspace.component_dir}/app_core
    -Itest/host
src_filter =
    +<*>
    -<app_main.cpp>
    -<sdkconfig.defaults>
    -<partitions.csv>
extra_src_filter =
    +<../components/nav_diagnostics/>
    +<../components/runtime_components/>
    +<../components/runtime_types/>
    +<../components/runtime_buffers/>
    +<../components/transport_uart/>
    +<../components/transport_tcp/>
    +<../components/gnss_um980/>
    +<../components/gnss_dual_heading/>
    +<../components/ntrip_client/>
    +<../components/rtcm_router/>
    +<../components/aog_navigation_app/>
    +<../components/protocol_rtcm/>
    +<../components/protocol_nmea/>
    +<../components/board_profiles/>
    +<../components/hal_backend/>
    +<../components/hal_uart/>
    +<../components/runtime/>
    +<../components/runtime_fast/>
    +<../components/feature_flags/>
    -<../components/hal_uart/hal_uart_esp32.c>
test_build_src = true
test_filter = *
