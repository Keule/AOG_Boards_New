; PlatformIO unit test for CRT-GNSS-CACHE-001
; Runs as native host test (no ESP32 required)

[env:native_test_gnss_cache]
platform = native
framework =
build_flags =
    -D AOG_ESP_MULTIBOARD=1
    -D UNIT_TEST
    -D UNITY_INCLUDE_DOUBLE
    -lm
test_framework = unity
test_build_src = false
test_filter = test_gnss_cache
extra_scripts = pre:extra_scripts/native_test.py

