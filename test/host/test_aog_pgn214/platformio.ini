; PlatformIO unit test for AOG PGN 214
; Runs as native host test (no ESP32 required)

[env:native_test_aog_pgn214]
platform = native
framework =
build_flags =
    -D AOG_ESP_MULTIBOARD=1
    -D UNIT_TEST
test_framework = unity
test_build_src = false
test_filter = test_aog_pgn214
extra_scripts = pre:extra_scripts/native_test.py
