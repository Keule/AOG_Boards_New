; PlatformIO unit test for NAV-DIAG-001
; Runs as native host test (no ESP32 required)

[env:native_test_nav_diagnostics]
platform = native
framework =
build_flags =
    -D AOG_ESP_MULTIBOARD=1
    -D UNIT_TEST
test_framework = unity
test_build_src = false
test_filter = test_nav_diagnostics
extra_scripts = pre:extra_scripts/native_test.py
